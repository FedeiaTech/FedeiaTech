<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="800" height="419" viewBox="0 0 800 419">

  <!-- GIF de fondo -->
  <image href="https://raw.githubusercontent.com/FedeiaTech/FedeiaTech/main/assets/robots.gif"
         x="0" y="0" width="800" height="419" preserveAspectRatio="xMidYMid slice"/>

  <!-- Overlay oscuro para legibilidad del texto -->
  <rect x="0" y="0" width="800" height="419" fill="rgba(10,10,20,0.52)"/>

  <style>
    .name {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 48px;
      font-weight: 700;
      fill: #ffffff;
      letter-spacing: 2px;
    }
    .cursor {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 48px;
      font-weight: 700;
      fill: #61DAFB;
    }
    .sub {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 18px;
      fill: #61DAFB;
      letter-spacing: 4px;
    }
    .tag {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      fill: #ffffff;
      opacity: 0.4;
    }

    /* Nombre: aparece con fade-in */
    .name {
      animation: fadeIn 1.2s ease forwards;
      opacity: 0;
    }
    /* Cursor parpadeante */
    .cursor {
      animation: blink 1s step-end infinite;
    }
    /* Subtítulo: aparece 1s después */
    .sub {
      animation: fadeIn 1s ease 1.4s forwards;
      opacity: 0;
    }
    /* Tags de código: aparecen al final */
    .tag-top {
      animation: fadeIn 0.8s ease 0.2s forwards;
      opacity: 0;
    }
    .tag-bot {
      animation: fadeIn 0.8s ease 2.2s forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>

  <!-- Tag superior -->
  <text x="36" y="52" class="tag tag-top">&lt;federico.iacono&gt;</text>

  <!-- Nombre principal -->
  <text x="400" y="185" class="name" text-anchor="middle">Federico Iacono</text>
  <text x="612" y="185" class="cursor">_</text>

  <!-- Línea divisoria -->
  <line x1="240" y1="205" x2="560" y2="205" stroke="#61DAFB" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" from="0" to="0.4" dur="0.6s" begin="1.2s" fill="freeze"/>
  </line>

  <!-- Subtítulo -->
  <text x="400" y="240" class="sub" text-anchor="middle">SOFTWARE DEVELOPER</text>

  <!-- Tag inferior -->
  <text x="36" y="400" class="tag tag-bot">&lt;/federico.iacono&gt;</text>
</svg>
