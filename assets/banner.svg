<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">

  <!-- Fondo oscuro estilo tokyonight -->
  <rect width="800" height="120" fill="#1a1b2e"/>

  <!-- Línea de acento superior -->
  <rect width="800" height="3" fill="#61DAFB" opacity="0.7"/>

  <style>
    .tag {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      fill: #ffffff;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.1s forwards;
    }
    .name {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 38px;
      font-weight: 700;
      fill: #ffffff;
      opacity: 0;
      animation: slideUp 0.8s ease 0.4s forwards;
    }
    .cursor {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 38px;
      font-weight: 700;
      fill: #61DAFB;
      animation: blink 1s step-end infinite;
    }
    .sub {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      fill: #61DAFB;
      letter-spacing: 5px;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.2s forwards;
    }
    .tag-close {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      fill: #ffffff;
      opacity: 0;
      animation: fadeIn 0.6s ease 1.8s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 0.4; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>

  <text x="32" y="28" class="tag">&lt;federico.iacono&gt;</text>

  <text x="400" y="72" class="name" text-anchor="middle">Federico Iacono</text>
  <text x="617" y="72" class="cursor">_</text>

  <text x="400" y="96" class="sub" text-anchor="middle">SOFTWARE DEVELOPER</text>

  <text x="32" y="114" class="tag-close">&lt;/federico.iacono&gt;</text>

  <!-- Línea de acento inferior -->
  <rect y="117" width="800" height="3" fill="#61DAFB" opacity="0.7"/>
</svg>
